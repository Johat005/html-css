<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="">
        <h2>FORMULARIO DE CONTACTO</h2>
        <div class="form_input">
            <label for="nom">Nombre</label>
            <input type="text" placeholder="Maria Fernanda" id="nom">
        </div>
        <div class="form_input">
            <label for="ape">Apellido</label>
            <input type="text" placeholder="Rodriguez Perez" id="ape">
        </div>
        <div class="form_input">
            <label for="ema">Email</label>
            <input type="email" placeholder="Email@gmail.com" id="ema">
        </div>
        <div class="form_input">
            <label for="pas">Contraseña</label>
            <input type="password" placeholder="****" id="pas">
        </div>
        <div class="form_input">
            <label for="men">Mensaje</label>
            <textarea name="" id="men" placeholder="Deja aqui tu mensaje..." ></textarea>
        </div>
    </form>
</body>
</html>
