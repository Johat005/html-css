<!--FORMULARIOS-->

<!DOCTYPE html>
<html>
<head>
    <title>Formularios</title>
</head>
<body>
    <!--Formulario-->
    <form>
        <!--Inputs-->
        <h2>Inputs</h2>
        <input type="text">
        <br>
        <input type="color">
        <br>
        <input type="email">
        <br>
        <input type="password">
        <br>
        <input type="checkbox">
        <br>
        <input type="radio">
        <br>
        <input type="file">
        <br>
        <input type="date">

        <!--Atributos-->
        <h2>Inputs con atributos</h2>
        <input type="text" required>
        <br>
        <input type="texto" name="este_es_un_identificador">
        <br>
        <input type="password" placeholder="Este es un placeholder">
        <br>
        <input type="text" value="Ya aparezco con texto">
        <br>
        <input type="text" min="3" max="14">
        <br>
        <br>

        <input type="submit" >
    </form>
</body>
</html>
