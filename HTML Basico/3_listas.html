<!--LISTAS ORDENADAS Y DESORDENADAS-->

<!DOCTYPE html>
<html>
<head>
    <title>Listas</title>
</head>
<body>
    <!--Lista ordenada-->
    <ol>
        <li>Este es un item de la lista ordenada y aparece con un numero de item porque es ordenada </li>
    </ol>
    <!--Lista desordenada-->
    <ul>
        <li>Este es un item de lista desordenada y aparece con un puntito de item porque es desordenada</li>
    </ul>
</body>
</html>
